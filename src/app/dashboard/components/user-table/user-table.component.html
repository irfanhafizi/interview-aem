<div class="table-responsive">
  <table class="table">
    <thead>
      <tr>
        <th>#</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>User Name</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ user.firstName }}</td>
        <td>{{ user.lastName }}</td>
        <td>@{{ user.username }}</td>
      </tr>
      <tr *ngIf="users.length === 0">
        <td colspan="4" class="text-center">No users found.</td>
      </tr>
    </tbody>
  </table>
</div>
